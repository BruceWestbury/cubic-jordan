<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Obstructions Catalogue</title>
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [
                        ["\\(", "\\)"],
                        ["$", "$"],
                    ],
                },
            };
        </script>
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
            async
        ></script>

        <style>
            body {
                max-width: 1100px;
                margin: 0 auto;
                padding: 2rem;
                font-family: system-ui, sans-serif;
                line-height: 1.5;
                color: #222;
                background: #fafafa;
            }

            header {
                margin-bottom: 2rem;
            }

            h1 {
                font-weight: 500;
                margin-bottom: 0.25rem;
            }

            #status {
                margin: 1rem 0;
                color: #666;
            }

            .catalogue {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1rem;
            }

            .card {
                background: white;
                border: 1px solid #ddd;
                border-radius: 10px;
                padding: 1rem;
            }

            details {
                margin-top: 0.75rem;
            }

            summary {
                cursor: pointer;
                color: #003366;
            }

            pre {
                white-space: pre-wrap;
                overflow-x: auto;
                background: #f5f5f5;
                padding: 0.75rem;
                border-radius: 6px;
                font-size: 0.8rem;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>F₄ Obstruction Witnesses</h1>
            <p>
                The 38 obstruction witnesses for the F₄ computation at t = 16.
            </p>
        </header>

        <p>
            <a href="https://brucewestbury.github.io/">
                ← Back to Bruce Westbury
            </a>
        </p>

        <div id="status"></div>
        <main id="catalogue" class="catalogue"></main>

        <script>
            const status = document.getElementById("status");
            const catalogue = document.getElementById("catalogue");

            async function loadCatalogue() {
                const path = "../projects/f4/cache/obstructions_t16.json";

                status.textContent = `Loading ${path} ...`;
                catalogue.innerHTML = "";

                try {
                    const response = await fetch(path);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    renderCatalogue(data);
                } catch (error) {
                    status.textContent = `Could not load catalogue: ${error.message}`;
                }
            }

            function renderCatalogue(data) {
                const records = data.records || [];
                const t = data.t ?? data.metadata?.t ?? "?";

                status.textContent = `t = ${t}: ${records.length} obstruction witness(es)`;
                catalogue.innerHTML = "";

                for (const record of records) {
                    catalogue.appendChild(obstructionCard(record));
                }

                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise();
                }
            }

            function sagePolynomialToLatex(text) {
                return String(text).replaceAll("*", "\\,");
            }

            function obstructionCard(record) {
                const card = document.createElement("article");
                card.className = "card";

                card.innerHTML = `
                    <h2>Witness ${record.display_index}</h2>

                    <p>
                        <strong>Source key</strong><br>
                        <code>${record.source_key}</code>
                    </p>

                    <p>
                        <strong>Multiplier</strong>
                        \\(${sagePolynomialToLatex(record.multiplier)}\\)
                    </p>

                    <details>
                        <summary>Raw obstruction</summary>
                        <pre>${record.raw_obstruction}</pre>
                    </details>

                    <details>
                        <summary>Factorisation</summary>
                        <pre>${record.factorisation}</pre>
                    </details>

                    <details>
                        <summary>Provenance</summary>
                        <pre>${JSON.stringify(record.provenance, null, 2)}</pre>
                    </details>

                    <details>
                        <summary>Relation</summary>
                        <pre>${JSON.stringify(record.relation, null, 2)}</pre>
                    </details>
                `;

                return card;
            }

            loadCatalogue();
        </script>
    </body>
</html>
