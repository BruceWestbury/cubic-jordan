<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Closed Graph Catalogue</title>

        <style>
            body {
                max-width: 1100px;
                margin: 0 auto;
                padding: 2rem;
                font-family: system-ui, sans-serif;
                line-height: 1.5;
                color: #222;
                background: #fafafa;
            }

            header {
                margin-bottom: 2rem;
            }

            h1 {
                font-weight: 500;
                margin-bottom: 0.25rem;
            }

            .controls {
                margin: 1.5rem 0;
                padding: 1rem;
                background: white;
                border: 1px solid #ddd;
                border-radius: 8px;
            }

            button {
                margin-right: 0.5rem;
                padding: 0.4rem 0.8rem;
                border: 1px solid #999;
                border-radius: 6px;
                background: white;
                cursor: pointer;
            }

            button:hover {
                background: #eee;
            }

            button.active {
                background: #222;
                color: white;
            }

            #status {
                margin: 1rem 0;
                color: #666;
            }

            .catalogue {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1rem;
            }

            .card {
                background: white;
                border: 1px solid #ddd;
                border-radius: 10px;
                padding: 1rem;
            }

            .drawing {
                min-height: 160px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1rem;
                border-bottom: 1px solid #eee;
                padding-bottom: 1rem;
            }

            .drawing svg {
                max-width: 100%;
                height: auto;
            }

            .evaluation {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 0.9rem;
                background: #f3f3f3;
                padding: 0.5rem;
                border-radius: 6px;
                overflow-x: auto;
            }

            details {
                margin-top: 0.75rem;
            }

            summary {
                cursor: pointer;
                color: #003366;
            }

            pre {
                white-space: pre-wrap;
                overflow-x: auto;
                background: #f5f5f5;
                padding: 0.75rem;
                border-radius: 6px;
                font-size: 0.8rem;
            }

            .small {
                font-size: 0.85rem;
                color: #666;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>Closed Graph Catalogue</h1>
            <p>
                Closed cubic girth-five graphs for the F₄ computation. This page
                loads cached JSON files generated offline.
            </p>
        </header>

        <section class="controls">
            <strong>Number of vertices:</strong>
            <button data-t="10">t = 10</button>
            <button data-t="12">t = 12</button>
            <button data-t="14">t = 14</button>
        </section>

        <p id="status">Choose a value of t.</p>

        <main id="catalogue" class="catalogue"></main>

        <script>
            const buttons = document.querySelectorAll("button[data-t]");
            const status = document.getElementById("status");
            const catalogue = document.getElementById("catalogue");

            for (const button of buttons) {
                button.addEventListener("click", () => {
                    const t = button.dataset.t;
                    setActiveButton(button);
                    loadCatalogue(t);
                });
            }

            function setActiveButton(activeButton) {
                for (const button of buttons) {
                    button.classList.toggle("active", button === activeButton);
                }
            }

            async function loadCatalogue(t) {
                const path = `/trivalent-graphs/projects/f4/cache/closed/closed_t${t}.json`;

                status.textContent = `Loading ${path} ...`;
                catalogue.innerHTML = "";

                try {
                    const response = await fetch(path);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    renderCatalogue(data);
                } catch (error) {
                    status.textContent = `Could not load catalogue: ${error.message}`;
                }
            }

            function renderCatalogue(data) {
                const records = data.records || [];
                const t = data.metadata?.t ?? "?";

                status.textContent = `t = ${t}: ${records.length} graph(s)`;

                catalogue.innerHTML = "";

                for (const record of records) {
                    catalogue.appendChild(graphCard(record));
                }
            }

            function graphCard(record) {
                const card = document.createElement("article");
                card.className = "card";

                const drawing = document.createElement("div");
                drawing.className = "drawing";
                drawing.innerHTML =
                    record.svg || "<p class='small'>No SVG available.</p>";

                const evaluation = document.createElement("div");
                evaluation.className = "evaluation";
                evaluation.textContent =
                    record.evaluation === null ||
                    record.evaluation === undefined
                        ? "evaluation: not cached"
                        : `evaluation: ${record.evaluation}`;

                card.appendChild(drawing);
                card.appendChild(evaluation);

                if (record.dot) {
                    const dotDetails = document.createElement("details");
                    const dotSummary = document.createElement("summary");
                    dotSummary.textContent = "DOT";
                    const dotPre = document.createElement("pre");
                    dotPre.textContent = record.dot;

                    dotDetails.appendChild(dotSummary);
                    dotDetails.appendChild(dotPre);
                    card.appendChild(dotDetails);
                }

                if (record.internal) {
                    const details = document.createElement("details");
                    const summary = document.createElement("summary");
                    summary.textContent = "Internal identifiers";

                    const pre = document.createElement("pre");
                    pre.textContent = JSON.stringify(record.internal, null, 2);

                    details.appendChild(summary);
                    details.appendChild(pre);
                    card.appendChild(details);
                }

                return card;
            }

            loadCatalogue(10);
            setActiveButton(document.querySelector('button[data-t="10"]'));
        </script>
    </body>
</html>
